$kind: http-request
description: |-
  Protected — Returns the profile of the currently authenticated user via the
  federated gateway (proxied to User Management subgraph).
url: "{{graphql_url}}"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: >-
    {
      "query": "query Me { me { _id email username firstName lastName bio avatar roles isActive createdAt updatedAt } }"
    }
order: 1000
