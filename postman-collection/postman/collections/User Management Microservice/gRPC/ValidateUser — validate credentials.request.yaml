$kind: http-request
description: |-
  **gRPC — UserService.ValidateUser**

  Proto package: `user`  
  Service: `UserService`  
  Method: `ValidateUser`  
  Server URL: `localhost:50051`  
  Proto file: `src/proto/user.proto`

  Used by the API Gateway or Auth service to verify user credentials.

  **Request message:**
  ```json
  { "email": "alice@example.com", "password": "Secret123!" }
  ```

  **Response message (valid):**
  ```json
  {
    "isValid": true,
    "user": { "id": "...", "email": "alice@example.com", ... }
  }
  ```

  **Response message (invalid):**
  ```json
  { "isValid": false, "user": null }
  ```
url: "{{grpc_url}}"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: X-Grpc-Note
    value: "Use Postman gRPC client: package=user, service=UserService,
      method=ValidateUser"
    disabled: true
body:
  type: json
  content: |-
    {
      "email": "alice@example.com",
      "password": "Secret123!"
    }
order: 3000
