    "id": "...",
    "email": "alice@example.com",
    "username": "alice",
    "firstName": "Alice",
    "lastName": "Smith",
    "avatar": "",
    "bio": "",
    "roles": ["user"],
    "isActive": true,
    "createdAt": "2026-03-13T09:00:00.000Z",
    "updatedAt": "2026-03-13T09:00:00.000Z"
  }
  ```
url: "{{grpc_url}}"
method: POST
headers:
