$kind: http-request
description: |-
  Public — Register a new user account.

  Auto-saves `_id` to the `user_id` collection variable.
url: "{{graphql_url}}"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "query": "mutation Register($input: CreateUserInput!) { register(createUserInput: $input) { _id email username firstName lastName roles isActive createdAt } }",
      "variables": {
        "input": {
          "email": "alice@example.com",
          "username": "alice",
          "password": "Secret123!",
          "firstName": "Alice",
          "lastName": "Smith"
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.data && res.data.register) {
        pm.collectionVariables.set('user_id', res.data.register._id);
        console.log('Registered user id:', res.data.register._id);
      }
    language: text/javascript
order: 1000
