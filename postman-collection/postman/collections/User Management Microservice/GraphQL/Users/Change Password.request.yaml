$kind: http-request
description: Protected — Changes the authenticated user's password.
url: "{{graphql_url}}"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: >-
    {
      "query": "mutation ChangePassword($input: ChangePasswordInput!) { changePassword(changePasswordInput: $input) { _id email updatedAt } }",
      "variables": {
        "input": {
          "currentPassword": "Secret123!",
          "newPassword": "NewSecret456!"
        }
      }
    }
order: 5000
